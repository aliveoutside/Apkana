name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify (check + test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libx11-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev \
            libgl1-mesa-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Cargo check
        run: cargo check --locked

      - name: Cargo test
        run: cargo test --locked

  build-linux:
    name: Build Linux archive
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libx11-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev \
            libgl1-mesa-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      - name: Package
        run: |
          mkdir -p package dist
          cp target/release/apkana package/
          cp LICENSE package/
          cp .github/PORTABLE_SETUP.md package/README.txt
          tar -czf dist/apkana-linux-x86_64.tar.gz -C package .

      - name: Upload Linux archive
        uses: actions/upload-artifact@v4
        with:
          name: apkana-linux-x86_64
          path: dist/apkana-linux-x86_64.tar.gz

  build-windows:
    name: Build Windows archive
    runs-on: windows-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package, dist -Force | Out-Null
          Copy-Item target/release/apkana.exe package/
          Copy-Item LICENSE package/
          Copy-Item .github/PORTABLE_SETUP.md package/README.txt
          Compress-Archive -Path package/* -DestinationPath dist/apkana-windows-x86_64.zip -Force

      - name: Upload Windows archive
        uses: actions/upload-artifact@v4
        with:
          name: apkana-windows-x86_64
          path: dist/apkana-windows-x86_64.zip

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum apkana-linux-x86_64.tar.gz apkana-windows-x86_64.zip > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: .github/RELEASE_NOTES.md
          files: |
            dist/apkana-linux-x86_64.tar.gz
            dist/apkana-windows-x86_64.zip
            dist/SHA256SUMS
